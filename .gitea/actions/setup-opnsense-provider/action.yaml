name: Setup OPNsense Terraform Provider
description: Build and install the OPNsense Terraform provider into the local plugin cache.

inputs:
  build-tools-dir:
    description: Path to the build-tools checkout
    required: true

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache-dependency-path: ${{ inputs.build-tools-dir }}/terraform/terraform-provider-opnsense/go.sum

    - name: Build and install OPNsense provider
      shell: bash
      working-directory: ${{ inputs.build-tools-dir }}/terraform/terraform-provider-opnsense
      run: |
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac
        PLUGIN_DIR="$HOME/.terraform.d/plugins/registry.terraform.io/anydef/opnsense/0.1.0/${OS}_${ARCH}"
        mkdir -p "$PLUGIN_DIR"
        go build -o "$PLUGIN_DIR/terraform-provider-opnsense"
        echo "OPNsense provider installed to $PLUGIN_DIR"
